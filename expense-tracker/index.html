<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <title>Weekly Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="summary">
        <div class="top-row">
          <div>
            <p class="eyebrow" id="weekLabel">This week</p>
            <h1>$0.00</h1>
          </div>
          <button class="icon-button" id="clearWeekButton" type="button" aria-label="Clear this week">
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <div class="budget-meter" aria-label="Weekly budget progress">
          <div class="meter-track">
            <div class="meter-fill" id="budgetFill"></div>
          </div>
          <div class="meter-copy">
            <span id="budgetStatus">No budget set</span>
            <strong id="remainingAmount">$0.00 left</strong>
          </div>
        </div>

        <form class="budget-form" id="budgetForm">
          <label for="budgetInput">Weekly budget</label>
          <div class="input-action">
            <input id="budgetInput" name="budget" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00">
            <button type="submit">Set</button>
          </div>
        </form>
      </section>

      <section class="entry-panel">
        <form class="expense-form" id="expenseForm">
          <div class="field">
            <label for="expenseName">Expense</label>
            <input id="expenseName" name="name" autocomplete="off" placeholder="Coffee, groceries, fuel">
          </div>
          <div class="field">
            <label for="expenseAmount">Amount</label>
            <input id="expenseAmount" name="amount" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00" required>
          </div>
          <button class="primary-button" type="submit">Add expense</button>
        </form>
      </section>

      <section class="history">
        <div class="section-heading">
          <h2>This week</h2>
          <p id="entryCount">0 expenses</p>
        </div>
        <ul class="expense-list" id="expenseList"></ul>
        <div class="empty-state" id="emptyState">
          <strong>No spending logged yet.</strong>
          <span>Add your first expense above.</span>
        </div>
      </section>
    </main>

    <template id="expenseTemplate">
      <li class="expense-item">
        <div>
          <strong class="expense-title"></strong>
          <span class="expense-meta"></span>
        </div>
        <div class="expense-actions">
          <span class="expense-price"></span>
          <button type="button" class="small-button edit-button">Edit</button>
          <button type="button" class="small-button delete-button">Delete</button>
        </div>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
